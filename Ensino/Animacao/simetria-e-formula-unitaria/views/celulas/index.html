<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta content="width=1280, initial-scale=0.25, minimum-scale=0.25, maximum-scale=5, user-scalable=yes" name="viewport">
<title>Translação — Células Unitárias (contagem por fórmula)</title>

</meta>
<link rel="stylesheet" href="assets/css/style1.css" />
</head>
<body>
<div class="wrap">
<div class="panel">
<header>
<h1>Translação — Células Unitárias</h1>
<small>drag = girar • scroll = zoom • D = reset • ortográfica</small>
</header>
<canvas height="840" id="sceneCanvas" width="1400"></canvas>
</div>
<div class="panel" id="right">
<header><h1>Controles</h1><small>Método da simetria de translação</small></header>
<div class="ui"><label>Translação X (a·u)
          <input id="tx" max="1" min="-1" step="0.01" type="range" value="0"/>
</label><label>Translação Y (b·u)
          <input id="ty" max="1" min="-1" step="0.01" type="range" value="0"/>
</label><label>Translação Z (c·u)
          <input id="tz" max="1" min="-1" step="0.01" type="range" value="0"/>
</label><label class="col-span-2 check">
<input id="showLattice" type="checkbox"/>
<span>Mostrar rede cristalina toda</span>
</label><details class="col-span-2 fold"><summary>Configurações (célula e exemplo)</summary><div class="fold-body"><label class="col-span-2">Sistema cristalino
          <select id="cellType">
<option value="cubic">Cúbica</option>
<option value="tetragonal">Tetragonal</option>
<option value="orthorhombic">Ortorrômbica</option>
<option value="hexagonal">Hexagonal (γ=120°)</option>
<option value="rhombohedral">Romboédrica (Trigonal)</option>
<option value="monoclinic">Monoclínica</option>
<option value="triclinic">Triclínica</option>
</select>
</label><label>Exemplo
          <select id="preset">
<option value="sc">Cúbica Simples (SC)</option>
<option value="bcc">Cúbica de Corpo Centrado (BCC)</option>
<option value="fcc">Cúbica de Face Centrada (FCC)</option>
<option value="custom">Custom</option>
</select>
</label><label>Zoom
          <input id="zoom" max="2" min="0.6" step="0.01" type="range" value="1.0"/>
</label></div></details><details class="col-span-2 fold"><summary>Elementos (vértice/aresta/face/centro)</summary><div class="fold-body"><div class="col-span-2 grid2">
<label>Elemento nos vértices<select id="symV"><option>A</option><option selected="">B</option><option>C</option><option>D</option></select></label>
<label>Elemento nas arestas<select id="symE"><option>A</option><option>B</option><option>C</option><option>D</option></select></label>
<label>Elemento nas faces<select id="symF"><option selected="">A</option><option>B</option><option>C</option><option>D</option></select></label>
<label>Elemento no centro<select id="symC"><option>A</option><option>B</option><option selected="">C</option><option>D</option></select></label>
</div></div></details><details class="col-span-2 fold"><summary>Legenda</summary><div class="fold-body"><div class="legend col-span-2" title="Cores por posição">
<div class="chip"><span class="dot vtx"></span>Vértice</div>
<div class="chip"><span class="dot edge"></span>Aresta</div>
<div class="chip"><span class="dot face"></span>Face</div>
<div class="chip"><span class="dot center"></span>Centro</div>
</div><div class="legend col-span-2" title="Cores por elemento">
<div class="elem"><span class="sq" style="color:var(--A)"></span>A</div>
<div class="elem"><span class="sq" style="color:var(--B)"></span>B</div>
<div class="elem"><span class="sq" style="color:var(--C)"></span>C</div>
<div class="elem"><span class="sq" style="color:var(--D)"></span>D</div>
</div></div></details><details class="col-span-2 fold"><summary>Leitura (matriz e parâmetros)</summary><div class="fold-body"><div class="readout col-span-2" id="readout"></div></div></details></div>
</div>
</div>


<script src="assets/js/script1.js"></script>
</body>
</html>
