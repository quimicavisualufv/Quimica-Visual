<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1280, initial-scale=0.25, minimum-scale=0.25, maximum-scale=5, user-scalable=yes" />
<title>Batalha de Polaridade · 3D</title>
<link rel="stylesheet" href="assets/css/style1.css" />
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <h1 id="pageTitle"></h1>
    <p id="pageSubtitle" class="subtitle"></p>
    <section class="card">
      <div class="meta">
        <span class="chip" id="progress"></span>
        <span class="chip" id="score"></span>
      </div>
      <div class="promptTitle" id="promptTitle"></div>
      <p class="promptText" id="promptText"></p>
      <div class="options" id="options"></div>
      <div class="actions">
        <button class="btn" id="prevBtn" type="button">Item anterior</button>
        <button class="btn primary" id="revealBtn" type="button">Exibir resposta</button>
        <button class="btn" id="nextBtn" type="button">Item seguinte</button>
      </div>
      <div class="feedback" id="feedback"></div>
    </section>
    <section class="card">
      <div class="hint">Arraste a cena para examinar as geometrias moleculares e compare a simetria das distribuições de carga.</div>
    </section>
  </aside>
  <main class="stage">
    <canvas id="scene"></canvas>
    <div class="hud" id="hud"></div>
  </main>
</div>
<script src="assets/js/script1.js"></script>
</body>
</html>
