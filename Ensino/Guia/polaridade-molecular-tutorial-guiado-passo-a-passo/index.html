<!DOCTYPE html>
<html lang="pt-BR">
<head>



<meta charset="utf-8" />
<meta name="viewport" content="width=1280, initial-scale=0.25, minimum-scale=0.25, maximum-scale=5, user-scalable=yes" />
<title>Geometria Molecular 3D </title>
<link rel="stylesheet" href="assets/css/style1.css" />
</head>
<body>
<div class="app">
  <aside>
    <h1>Geometria Molecular 3D</h1>

    <fieldset>
      <legend>Geometria (VSEPR)</legend>
      <label for="geom">Escolha um arranjo</label>
      <select id="geom">
        <optgroup label="Sem pares não-ligantes (E=0)">
          <option value="linear">Linear (AX2)</option>
          <option value="trigonal_planar">Trigonal planar (AX3)</option>
          <option value="tetrahedral" selected>Tetraédrica (AX4)</option>
          <option value="trigonal_bipyramidal">Bipirâmide trigonal (AX5)</option>
          <option value="octahedral">Octaédrica (AX6)</option>
        </optgroup>
        <optgroup label="Com pares não-ligantes">
          <option value="bent_tp">Angular (AX2E, base trigonal planar)</option>
          <option value="trigonal_pyramidal">Piramidal trigonal (AX3E)</option>
          <option value="bent_tet">Angular (AX2E2, base tetraédrica)</option>
          <option value="see_saw">Gangorra / Seesaw (AX4E)</option>
          <option value="t_shaped">Em T (AX3E2)</option>
          <option value="linear_tbp">Linear (AX2E3, base TBP)</option>
          <option value="square_pyramidal">Piramidal quadrada (AX5E)</option>
          <option value="square_planar">Quadrada planar (AX4E2)</option>
        </optgroup>
      </select>
      <div class="geomQuickChecks">
        <label class="small"><input id="showAngles" type="checkbox" checked /> Mostrar ângulos</label>
        <label class="small"><input id="lightBgQuick" type="checkbox" /> Fundo branco</label>
      </div>
      <div class="row">
        <div><label for="bondLen">Comprimento de ligação</label><input id="bondLen" type="range" min="0.6" max="2.2" step="0.01" value="1.25" /></div>
        <div><label for="size">Raio do átomo central</label><input id="size" type="range" min="0.35" max="1.2" step="0.01" value="0.64" /></div>
      </div>
      <div class="row">
        <div><label for="ligandRadius">Raio dos ligantes</label><input id="ligandRadius" type="range" min="0.18" max="0.8" step="0.01" value="0.44" /></div>
        <div><label for="bondRadius">Raio da ligação</label><input id="bondRadius" type="range" min="0.03" max="0.18" step="0.005" value="0.085" /></div>
      </div>
      <div class="row">
        <div><label for="lpScale">Tamanho do par não-ligante</label><input id="lpScale" type="range" min="0.6" max="1.8" step="0.01" value="1.0" /></div>
        <div><label for="ambient">Luz ambiente</label><input id="ambient" type="range" min="0" max="1" step="0.01" value="0.45" /></div>
      </div>
      <div class="row">
        <div><label for="sat">Saturação</label><input id="sat" type="range" min="0" max="2" step="0.01" value="1.25" /></div>
        <div><label for="specK">Brilho especular</label><input id="specK" type="range" min="0" max="0.6" step="0.005" value="0" /></div>
      </div>
      <div class="row">
        <div><label for="refl">Reflexo (ambiente)</label><input id="refl" type="range" min="0" max="0.8" step="0.01" value="0" /></div>
        <div></div>
      </div>
      <div class="row">
        <div><label for="ligandColor">Cor dos ligantes</label><input id="ligandColor" type="color" value="#0b2e87" /></div>
        <div><label for="lpColor">Cor dos pares não-ligantes</label><input id="lpColor" type="color" value="#1100ff" /></div>
      </div>
      <div><label for="coreColor">Cor do átomo central</label><input id="coreColor" type="color" value="#ffffff" /></div>

      <div class="row">
        <div>
          <label for="bondType">Tipo de ligação</label>
          <select id="bondType">
            <option value="1" selected>Simples (-)</option>
            <option value="2">Dupla (=)</option>
            <option value="3">Tripla (≡)</option>
          </select>
        </div>
        <div class="checkStack">
          <label class="small"><input id="showAxes" type="checkbox" checked /> Mostrar eixos XYZ</label>
        </div>
        <div></div>
      </div>

      <button class="btn" id="save">Salvar imagem (PNG)</button>
    </fieldset>

    <fieldset>
      <legend>Fundo espacial</legend>
      <div class="row">
        <div><label for="bgBrightness">Brilho</label><input id="bgBrightness" type="range" min="0" max="1.6" step="0.01" value="0" /></div>
        <div><label for="bgStars">Densidade de estrelas</label><input id="bgStars" type="range" min="0" max="2.5" step="0.01" value="0" /></div>
      </div>
      <div style="margin-top:10px"><label class="small"><input id="lightBg" type="checkbox" /> Fundo branco</label></div>
    </fieldset>

    <fieldset>
      <legend>Rotação do modelo</legend>
      <div class="row3">
        <div><label for="rotXS">Ângulo X (°)</label><input id="rotXS" type="range" min="-180" max="180" step="1" value="0" /></div>
        <div><label for="rotYS">Ângulo Y (°)</label><input id="rotYS" type="range" min="-180" max="180" step="1" value="0" /></div>
        <div class="rotZControl"><label for="rotZS">Rotação Z (°)</label><input id="rotZS" type="range" min="0" max="360" step="1" value="0" /></div>
      </div>
      <button class="btn" id="rotReset">Resetar rotação</button>
    </fieldset>

    <fieldset id="infoBox">
      <legend>Geometria selecionada</legend>
      <div class="badges"><div id="infoName" class="badge">-</div><div id="infoArr" class="badge">-</div></div>
      <div id="infoIdeal" class="small" style="margin-top:6px">-</div>
    </fieldset>

    <div class="tutorialWrap" id="tutorialWrap">
          <div class="tutorialCard" id="tutorialCard" aria-live="polite">
            <div class="tutorialTop">
              <div class="tutorialKicker">Tutorial guiado · VSEPR</div>
              <div class="tutorialStepTag" id="tutorialStepTag">Passo 1</div>
            </div>
            <h2 class="tutorialTitle" id="tutorialTitle">Carregando…</h2>
            <div class="tutorialBody" id="tutorialBody"></div>
            <div class="tutorialMini" id="tutorialMini"></div>
            <div class="tutorialNote" id="tutorialNote"></div>
            <div class="tutorialExamples" id="tutorialExamples"></div>
            <div class="tutorialZRot" id="tutorialZRotBox">
              <div class="zrHead"><b>Rotação no eixo Z</b><span id="tutorialRotZVal">0°</span></div>
              <button class="tbtn subtle" id="rot180Btn" style="width:100%; margin-top:8px">Rotacionar em 180º</button>
              <div class="zrHint">Atalho rápido: gira o modelo em torno de Z sem mexer na câmera.</div>
            </div>
            <div class="tutorialToggles" id="tutorialToggles">
              <label><input id="tutorialLightBg" type="checkbox" /> Fundo branco</label>
            </div>
            <div class="tutorialProgress"><i id="tutorialProgressBar"></i></div>
            <div class="tutorialActions">
              <button class="tbtn ghost" id="tutorialPrev">◀ Anterior</button>
              <button class="tbtn primary" id="tutorialNext">Próximo ▶</button>
                          </div>
          </div>
        </div>
  </aside>

  <main>
    <canvas id="gl"></canvas>
    <canvas id="angleOverlay"></canvas>
    <div id="miniAxesWrap" aria-hidden="true"><canvas id="miniAxes"></canvas></div>
    <div class="axesToggle" id="axesToggle"><label><input id="axesToggleChk" type="checkbox" checked /> Mostrar eixos</label></div>
    <div aria-label="Ângulos da molécula" class="angleLegendPanel" id="angleLegendPanel"></div>
    <div id="axisXLabel" class="axisLabel" style="color:#ff7a7a">x</div>
    <div id="axisYLabel" class="axisLabel" style="color:#6dffb0">y</div>
    <div id="axisZLabel" class="axisLabel" style="color:#7ec8ff">z</div>
    <div class="hud" id="hud">-</div>
    <div id="boardSplitOverlay" class="boardSplitOverlay" aria-hidden="true"><div class="ghostPane left"></div><div class="ghostPane right"></div><div class="sideTag left">🎈 Balões (analogia)</div><div class="sideTag right">🧪 Molécula</div></div>

        <div class="focusHint hide" id="focusHint"></div>

  </main>
</div>

<script src="assets/js/script1.js"></script>

<script src="assets/js/script2.js"></script>

</body>
</html>
