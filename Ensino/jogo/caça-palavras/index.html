<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>SiMoEns · Jogos offline</title>
<link rel="stylesheet" href="assets/css/style1.css"/>
<script src="assets/js/config.js"></script>
<script defer src="assets/js/script1.js"></script>
</head>
<body class="launcher-body">
<a class="acess-skip-link" href="#conteudo-principal" style="position:absolute;left:-9999px;top:auto;width:1px;height:1px;overflow:hidden;z-index:99999;background:#fff;color:#111;border:2px solid currentColor;border-radius:.375rem;padding:.5rem .75rem;text-decoration:none;" onfocus="this.style.left='1rem';this.style.top='1rem';this.style.width='auto';this.style.height='auto';this.style.overflow='visible';" onblur="this.style.left='-9999px';this.style.width='1px';this.style.height='1px';this.style.overflow='hidden';">Ir para o conteúdo principal</a>
<div role="main" class="launch-screen" id="conteudo-principal">
<h1 style="position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;">SiMoEns · Jogos offline</h1>
  <div class="launch-modal" id="launcher">
    <div class="launch-group">
      <div class="launch-label">Jogo</div>
      <div class="launch-choices cols2" id="launch-mode">
        <button type="button" class="launch-chip" data-mode="wordsearch">Caça-palavras</button>
        <button type="button" class="launch-chip" data-mode="crossword">Cruzadinha</button>
      </div>
    </div>
    <div class="launch-group">
      <div class="launch-label">Dificuldade</div>
      <div class="launch-choices cols3" id="launch-difficulty">
        <button type="button" class="launch-chip" data-difficulty="easy">Fácil</button>
        <button type="button" class="launch-chip" data-difficulty="medium">Média</button>
        <button type="button" class="launch-chip" data-difficulty="hard">Difícil</button>
      </div>
    </div>
    <div class="launch-group">
      <div class="launch-label">Tema</div>
      <div class="theme-list" id="launch-theme"></div>
    </div>
  </div>
</div>

<script src="../../../Chat/widget/vlibras-widget.js?v=vlibras-20260430b"></script>
<script defer src="../../../Chat/widget/simoens-accessibility.js?v=a11y-widget-20260430a"></script>
