<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>SiMoEns · Jogos offline</title>
<link rel="stylesheet" href="assets/css/style1.css"/>
<script src="assets/js/config.js"></script>
<script defer src="assets/js/script1.js"></script>
</head>
<body class="launcher-body">
<div class="launch-screen">
  <div class="launch-modal" id="launcher">
    <div class="launch-group">
      <div class="launch-label">Jogo</div>
      <div class="launch-choices cols2" id="launch-mode">
        <button type="button" class="launch-chip" data-mode="wordsearch">Caça-palavras</button>
        <button type="button" class="launch-chip" data-mode="crossword">Cruzadinha</button>
      </div>
    </div>
    <div class="launch-group">
      <div class="launch-label">Dificuldade</div>
      <div class="launch-choices cols3" id="launch-difficulty">
        <button type="button" class="launch-chip" data-difficulty="easy">Fácil</button>
        <button type="button" class="launch-chip" data-difficulty="medium">Média</button>
        <button type="button" class="launch-chip" data-difficulty="hard">Difícil</button>
      </div>
    </div>
    <div class="launch-group">
      <div class="launch-label">Tema</div>
      <div class="theme-list" id="launch-theme"></div>
    </div>
  </div>
</div>
</body>
</html>
