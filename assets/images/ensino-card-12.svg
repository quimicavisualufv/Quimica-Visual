<svg xmlns="http://www.w3.org/2000/svg" width="640" height="420" viewBox="0 0 640 420">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#15233d"/>
    </linearGradient>

    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1f2f4f"/>
      <stop offset="100%" stop-color="#16243f"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000" flood-opacity="0.28"/>
    </filter>

    <clipPath id="previewClip">
      <rect x="20" y="20" width="600" height="300" rx="24"/>
    </clipPath>
  </defs>

  <rect width="640" height="420" rx="28" fill="url(#bg)"/>

  <g opacity="0.08" stroke="#9cc7ff" stroke-width="1">
    <path d="M0 70H640"/><path d="M0 140H640"/><path d="M0 210H640"/><path d="M0 280H640"/><path d="M0 350H640"/>
    <path d="M90 0V420"/><path d="M180 0V420"/><path d="M270 0V420"/><path d="M360 0V420"/><path d="M450 0V420"/><path d="M540 0V420"/>
  </g>

  <rect x="20" y="20" width="600" height="300" rx="24" fill="#111b2e" stroke="#223555" stroke-width="2" filter="url(#shadow)"/>

  <g clip-path="url(#previewClip)">
    <svg x="20" y="20" width="600" height="300" viewBox="0 0 1000 1000" preserveAspectRatio="xMidYMid meet">

  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#1e0b3b"/>
      <stop offset="40%" stop-color="#0d041c"/>
      <stop offset="100%" stop-color="#05010f"/>
    </radialGradient>

    <!-- Giant Psi Gradient -->
    <linearGradient id="psiGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff007f"/>
      <stop offset="50%" stop-color="#7000ff"/>
      <stop offset="100%" stop-color="#00f0ff"/>
    </linearGradient>

    <!-- Generic Glow Filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="15" result="blur2"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="25" result="blur3"/>
      <feMerge>
        <feMergeNode in="blur3"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle Text Glow -->
    <filter id="glowText" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Particle Glow -->
    <filter id="glowParticle" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Deep Space Background -->
  

  <!-- Quantum Field Grid (Subtle) -->
  <g stroke="#ffffff" stroke-width="1" opacity="0.03">
    <circle cx="500" cy="500" r="100"/>
    <circle cx="500" cy="500" r="200"/>
    <circle cx="500" cy="500" r="300"/>
    <circle cx="500" cy="500" r="400"/>
    
    <line x1="500" y1="0" x2="500" y2="1000"/>
    <line x1="0" y1="500" x2="1000" y2="500"/>
    <line x1="146" y1="146" x2="854" y2="854"/>
    <line x1="146" y1="854" x2="854" y2="146"/>
  </g>

  <!-- Giant Background Psi (Ψ) -->
  <g fill="url(#psiGrad)" opacity="0.12" filter="url(#glow)">
    <!-- Stem -->
    <rect x="485" y="150" width="30" height="700" rx="15"/>
    <!-- Arms -->
    <path d="M 150 300 C 150 750, 850 750, 850 300 L 780 300 C 780 650, 220 650, 220 300 Z"/>
  </g>

  <!-- Abstract Quantum Orbitals -->
  <g stroke="#00f0ff" fill="none" stroke-width="1" opacity="0.15" filter="url(#glow)">
    <ellipse cx="500" cy="500" rx="350" ry="80" transform="rotate(30 500 500)"/>
    <ellipse cx="500" cy="500" rx="350" ry="80" transform="rotate(90 500 500)"/>
    <ellipse cx="500" cy="500" rx="350" ry="80" transform="rotate(150 500 500)"/>
  </g>

  <!-- Harmonic Oscillator Potential Well -->
  <path d="M 150 150 Q 500 1650 850 150" fill="none" stroke="#4d4dff" stroke-width="4" filter="url(#glow)" opacity="0.6"/>

  <!-- Energy Levels & Wavefunctions -->
  <g>
    <!-- E2 Level (Second Excited State) -->
    <line x1="180" y1="300" x2="820" y2="300" stroke="#ffffff" stroke-width="2" stroke-dasharray="8,8" opacity="0.3"/>
    <!-- Probability Density |Ψ|² (Filled Area) -->
    <path d="M 230 300 Q 320 100 410 300 Q 500 100 590 300 Q 680 100 770 300 Z" fill="#ff007f" opacity="0.15" filter="url(#glow)"/>
    <!-- Wavefunction Ψ (Line) -->
    <path d="M 230 300 Q 320 100 410 300 Q 500 500 590 300 Q 680 100 770 300" fill="none" stroke="#ff007f" stroke-width="5" filter="url(#glow)"/>

    <!-- E1 Level (First Excited State) -->
    <line x1="240" y1="500" x2="760" y2="500" stroke="#ffffff" stroke-width="2" stroke-dasharray="8,8" opacity="0.3"/>
    <!-- Probability Density |Ψ|² -->
    <path d="M 310 500 Q 405 300 500 500 Q 595 300 690 500 Z" fill="#ffaa00" opacity="0.15" filter="url(#glow)"/>
    <!-- Wavefunction Ψ -->
    <path d="M 310 500 Q 405 300 500 500 Q 595 700 690 500" fill="none" stroke="#ffaa00" stroke-width="5" filter="url(#glow)"/>

    <!-- E0 Level (Ground State) -->
    <line x1="320" y1="700" x2="680" y2="700" stroke="#ffffff" stroke-width="2" stroke-dasharray="8,8" opacity="0.3"/>
    <!-- Probability Density |Ψ|² -->
    <path d="M 400 700 Q 500 450 600 700 Z" fill="#00f0ff" opacity="0.15" filter="url(#glow)"/>
    <!-- Wavefunction Ψ -->
    <path d="M 400 700 Q 500 450 600 700" fill="none" stroke="#00f0ff" stroke-width="5" filter="url(#glow)"/>
  </g>

  <!-- Floating Particles / Quantum Dust -->
  <g filter="url(#glowParticle)">
    <circle cx="280" cy="220" r="3" fill="#00f0ff"/>
    <circle cx="720" cy="180" r="4" fill="#ff007f"/>
    <circle cx="350" cy="600" r="2.5" fill="#ffaa00"/>
    <circle cx="650" cy="400" r="3.5" fill="#00f0ff"/>
    <circle cx="450" cy="250" r="2" fill="#ffffff"/>
    <circle cx="550" cy="800" r="3" fill="#ff007f"/>
    <circle cx="800" cy="650" r="2" fill="#ffaa00"/>
    <circle cx="200" cy="750" r="4" fill="#00f0ff"/>
    <circle cx="500" cy="350" r="2.5" fill="#ffffff"/>
    <circle cx="600" cy="150" r="3" fill="#ffaa00"/>
  </g>

  <!-- Typography: Schrödinger Equations -->
  <g fill="#ffffff" filter="url(#glowText)" font-size="46">
    
    <!-- Time-Dependent Schrödinger Equation (Top) -->
    <g transform="translate(0, -10)">
      <!-- i ℏ -->
      <text x="355" y="110" font-style="italic">i</text>
      <text x="375" y="110" font-style="italic">ℏ</text>
      
      <!-- Fraction ∂Ψ / ∂t -->
      <text x="415" y="85">∂Ψ</text>
      <line x1="410" y1="98" x2="475" y2="98" stroke="#ffffff" stroke-width="3"/>
      <text x="425" y="135">∂t</text>
      
      <!-- = -->
      <text x="500" y="110" text-anchor="middle">=</text>
      
      <!-- Ĥ Ψ -->
      <text x="530" y="110" font-style="italic">H</text>
      <!-- Circumflex (Hat) over H -->
      <path d="M 538 78 L 545 68 L 552 78" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="565" y="110">Ψ</text>
    </g>

    <!-- Time-Independent Schrödinger Equation (Bottom) -->
    <g transform="translate(0, 30)">
      <!-- Ĥ ψ -->
      <text x="410" y="900" font-style="italic">H</text>
      <path d="M 418 868 L 425 858 L 432 868" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="445" y="900" font-style="italic">ψ</text>
      
      <!-- = -->
      <text x="500" y="900" text-anchor="middle">=</text>
      
      <!-- E ψ -->
      <text x="535" y="900" font-style="italic">E</text>
      <text x="565" y="900" font-style="italic">ψ</text>
    </g>

  </g>

  <!-- Side Mathematical Flourishes -->
  <!-- Normalization Condition (Left) -->
  <g transform="translate(80, 750) rotate(-90)" fill="#00f0ff" font-size="28" opacity="0.6" filter="url(#glowText)">
    <text x="0" y="0">∫ |Ψ|² dx = 1</text>
    <text x="-15" y="-15" font-size="16">∞</text>
    <text x="-25" y="25" font-size="16">-∞</text>
  </g>

  <!-- Heisenberg Uncertainty Principle (Right) -->
  <g transform="translate(920, 250) rotate(90)" fill="#ff007f" font-size="28" opacity="0.6" filter="url(#glowText)">
    <text x="0" y="0">Δx Δp ≥ ℏ/2</text>
  </g>


    </svg>
  </g>

  <rect x="20" y="336" width="600" height="64" rx="18" fill="url(#bar)" stroke="#25365b"/>
  <text x="44" y="378" fill="#eaf3ff" font-family="Manrope, Segoe UI, Arial" font-size="28" font-weight="700">Princípios da Mecânica Quântica</text>
</svg>