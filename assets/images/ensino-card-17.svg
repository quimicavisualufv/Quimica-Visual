        <use href="#mol" x="60" y="340" transform="rotate(-115 60 340)" />
        
        <use href="#mol" x="160" y="340" transform="rotate(-175 160 340)" />
        
        
        

        
        <g transform="translate(320, 40)">
            <use href="#thermo-base" />
            <path d="M -3 20 L -3 -5 A 3 3 0 0 1 3 -5 L 3 20 A 8 8 0 1 1 -3 20 Z" fill="#f59e0b" />
        </g>
    </g>

    
    
    
    <g transform="translate(810, 100)">
        <rect width="360" height="360" rx="20" fill="url(#gas-bg)" stroke="rgba(255,255,255,0.15)" stroke-width="2" />
        
        
        <path d="M 40 360 Q 40 270 90 220 T 140 70" stroke="rgba(255,255,255,0.06)" stroke-width="25" fill="none" stroke-linecap="round" />
        <path d="M 200 360 Q 220 250 180 180 T 220 40" stroke="rgba(255,255,255,0.04)" stroke-width="40" fill="none" stroke-linecap="round" />
        <path d="M 320 360 Q 300 280 340 200 T 300 80" stroke="rgba(255,255,255,0.05)" stroke-width="20" fill="none" stroke-linecap="round" />

        
        <use href="#moving-mol" x="70" y="90" transform="rotate(45 70 90)" />
        <use href="#moving-mol" x="210" y="70" transform="rotate(-120 210 70)" />
        <use href="#moving-mol" x="330" y="100" transform="rotate(15 330 100)" />
        
