        <use href="#mol" x="284" y="300" transform="rotate(240 284 300)" />
        <use href="#mol" x="76" y="300" transform="rotate(0 76 300)" />

        
        <g transform="translate(320, 40)">
            <use href="#thermo-base" />
            <path d="M -3 20 L -3 5 A 3 3 0 0 1 3 5 L 3 20 A 8 8 0 1 1 -3 20 Z" fill="#3b82f6" />
        </g>
    </g>

    
    
    
