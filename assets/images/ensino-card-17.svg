        <path d="M 180 120 L 232 150 L 232 210 L 180 240 L 128 210 L 128 150 Z                   M 180 120 L 180 60                   M 232 150 L 284 120                   M 232 210 L 284 240                   M 180 240 L 180 300                   M 128 210 L 76 240                   M 128 150 L 76 120                   M 180 60 L 232 30 L 284 60 L 284 120 L 336 150 L 336 210 L 284 240 L 284 300 L 232 330 L 180 300 L 128 330 L 76 300 L 76 240 L 24 210 L 24 150 L 76 120 L 76 60 L 128 30 Z" stroke="rgba(255,255,255,0.35)" stroke-width="4" stroke-dasharray="8 6" fill="none" stroke-linecap="round" />

        
