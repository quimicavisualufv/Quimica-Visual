        <linearGradient id="embed2_bondGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
            <stop offset="50%" stop-color="#94a3b8" stop-opacity="0.7"/>
            <stop offset="100%" stop-color="#ffffff" stop-opacity="0.9"/>
        </linearGradient>

        
        <filter id="embed2_glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="6" result="blur"/>
